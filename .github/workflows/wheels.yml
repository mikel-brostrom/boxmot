name: Build Wheels

# Builds platform wheels for ``boxmot`` using cibuildwheel.
# Each wheel bundles the pre-compiled native (C++) tracker shared
# libraries under ``boxmot/native/trackers/<name>/``.

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [master]
    paths:
      - 'boxmot/native/**'
      - 'CMakeLists.txt'
      - 'pyproject.toml'
      - '.github/workflows/wheels.yml'

jobs:
  build_wheels:
    name: Wheel ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            macos_target: ''
          - os: ubuntu-24.04-arm
            arch: aarch64
            macos_target: ''
          - os: macos-13
            arch: x86_64
            macos_target: '13.0'
          - os: macos-14
            arch: arm64
            macos_target: '14.0'
          - os: windows-2022
            arch: AMD64
            macos_target: ''
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel==2.21.3

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: 'cp39-* cp310-* cp311-* cp312-*'
          CIBW_SKIP: '*-musllinux_* *-manylinux_i686 pp*'
          # Use prebuilt manylinux_2_28 images that already contain OpenCV 4 +
          # Eigen3 (built and pushed by .github/workflows/build-manylinux-image.yml).
          CIBW_MANYLINUX_X86_64_IMAGE: ghcr.io/${{ github.repository_owner }}/boxmot-manylinux:latest-x86_64
          CIBW_MANYLINUX_AARCH64_IMAGE: ghcr.io/${{ github.repository_owner }}/boxmot-manylinux:latest-aarch64
          CIBW_BEFORE_ALL_LINUX: |
            set -euo pipefail
            if command -v apt-get >/dev/null; then
              apt-get update
              apt-get install -y cmake g++ libopencv-dev libeigen3-dev
            fi
          CIBW_BEFORE_ALL_MACOS: |
            brew install cmake opencv eigen
          CIBW_BEFORE_ALL_WINDOWS: |
            curl -L -o opencv.exe https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-windows.exe
            7z x opencv.exe -oC:\opencv-install -y
            vcpkg install eigen3:x64-windows
          # LD_LIBRARY_PATH lets auditwheel locate the OpenCV shared libs
          # installed under /usr/local/{lib,lib64} in the custom manylinux image
          # so they can be vendored into the repaired wheel.
          CIBW_ENVIRONMENT_LINUX: 'CMAKE_ARGS=-DBOXMOT_REQUIRE_NATIVE=ON LD_LIBRARY_PATH=/usr/local/lib64:/usr/local/lib:$LD_LIBRARY_PATH'
          # Match wheel platform tag to the Homebrew bottles' minimum target.
          # macos-14 (arm64) ships bottles built for 14.0; macos-13 for 13.0.
          CIBW_ENVIRONMENT_MACOS: 'CMAKE_ARGS=-DBOXMOT_REQUIRE_NATIVE=ON MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_target }}'
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_target }}
          # Windows: point CMake at the prebuilt OpenCV (vc16/x64) and at the
          # vcpkg toolchain for Eigen3. delvewheel (cibuildwheel's default
          # Windows repair tool) needs the OpenCV DLL dir on PATH so it can
          # vendor opencv_world*.dll into the wheel.
          CIBW_ENVIRONMENT_WINDOWS: 'CMAKE_ARGS="-DOpenCV_DIR=C:/opencv-install/opencv/build -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows -DBOXMOT_REQUIRE_NATIVE=ON" PATH="C:\\opencv-install\\opencv\\build\\x64\\vc16\\bin;$PATH"'
          CIBW_TEST_COMMAND: 'python -c "import boxmot; print(boxmot.__version__)"'
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
