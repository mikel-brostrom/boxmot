name: Build Platform Wheels (C++ bundled)

# Optional, manual-only workflow that builds per-platform wheels with the
# native (C++) trackers compiled and bundled inside, using cibuildwheel.
#
# The default release path (.github/workflows/publish.yml) ships a single
# pure-Python wheel and lets users opt into C++ via ``boxmot build``. This
# workflow exists so you can still produce fat platform wheels on demand
# (for benchmarking, internal distribution, or future PyPI uploads).
#
# Requirements to actually use this workflow:
#   * Switch the build backend in pyproject.toml from ``hatchling`` to
#     ``scikit-build-core`` (>=0.10) and restore the [tool.scikit-build]
#     section + the root CMakeLists.txt that drives the C++ build.
#   * Without that, cibuildwheel will still build pure-Python wheels.
#
# Trigger: manual via "Run workflow" only.

on:
  workflow_dispatch:
    inputs:
      upload_artifacts:
        description: 'Upload built wheels as artifacts'
        required: false
        type: boolean
        default: true

jobs:
  build_wheels:
    name: Wheel ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            macos_target: ''
          - os: ubuntu-24.04-arm
            arch: aarch64
            macos_target: ''
          - os: macos-13
            arch: x86_64
            macos_target: '13.0'
          - os: macos-14
            arch: arm64
            macos_target: '14.0'
          - os: windows-2022
            arch: AMD64
            macos_target: ''
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel==2.21.3

      - name: Install Windows native deps (OpenCV + Eigen)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          curl.exe -L --fail -o opencv.exe https://github.com/opencv/opencv/releases/download/4.10.0/opencv-4.10.0-windows.exe
          & 'C:\Program Files\7-Zip\7z.exe' x opencv.exe -oC:\opencv-install -y | Out-Null
          if (-not (Test-Path 'C:\opencv-install\opencv\build\OpenCVConfig.cmake')) {
            throw 'OpenCV extraction failed: OpenCVConfig.cmake not found'
          }
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install eigen3:x64-windows

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: 'cp39-* cp310-* cp311-* cp312-*'
          CIBW_SKIP: '*-musllinux_* *-manylinux_i686 pp*'
          CIBW_MANYLINUX_X86_64_IMAGE: ghcr.io/${{ github.repository_owner }}/boxmot-manylinux:latest-x86_64
          CIBW_MANYLINUX_AARCH64_IMAGE: ghcr.io/${{ github.repository_owner }}/boxmot-manylinux:latest-aarch64
          CIBW_BEFORE_ALL_LINUX: |
            set -euo pipefail
            if command -v apt-get >/dev/null; then
              apt-get update
              apt-get install -y cmake g++ libopencv-dev libeigen3-dev
            fi
          CIBW_BEFORE_ALL_MACOS: |
            brew install cmake opencv eigen
          CIBW_ENVIRONMENT_LINUX: 'CMAKE_ARGS=-DBOXMOT_REQUIRE_NATIVE=ON LD_LIBRARY_PATH=/usr/local/lib64:/usr/local/lib:$LD_LIBRARY_PATH'
          CIBW_ENVIRONMENT_MACOS: 'CMAKE_ARGS=-DBOXMOT_REQUIRE_NATIVE=ON MACOSX_DEPLOYMENT_TARGET=${{ matrix.macos_target }}'
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macos_target }}
          CIBW_ENVIRONMENT_WINDOWS: >-
            CMAKE_ARGS="-DOpenCV_DIR=C:/opencv-install/opencv/build
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
            -DVCPKG_TARGET_TRIPLET=x64-windows
            -DBOXMOT_REQUIRE_NATIVE=ON"
            PATH="C:\\opencv-install\\opencv\\build\\x64\\vc16\\bin;$PATH"
          CIBW_TEST_COMMAND: 'python -c "import boxmot; print(boxmot.__version__)"'
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        if: ${{ inputs.upload_artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
