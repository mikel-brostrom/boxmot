name: Build Wheels

# Builds platform wheels for ``boxmot`` using cibuildwheel.
# Each wheel bundles the pre-compiled native (C++) tracker shared
# libraries under ``boxmot/native/trackers/<name>/``.

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    branches: [master]
    paths:
      - 'boxmot/native/**'
      - 'CMakeLists.txt'
      - 'pyproject.toml'
      - '.github/workflows/wheels.yml'

jobs:
  build_wheels:
    name: Wheel ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64
          - os: windows-latest
            arch: AMD64
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip cibuildwheel==2.21.3

      - name: Build wheels
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD: 'cp39-* cp310-* cp311-* cp312-*'
          CIBW_SKIP: '*-musllinux_* *-manylinux_i686 pp*'
          CIBW_BEFORE_ALL_LINUX: |
            if command -v dnf >/dev/null; then
              dnf install -y cmake gcc-c++ opencv-devel eigen3-devel
            else
              apt-get update && apt-get install -y cmake g++ libopencv-dev libeigen3-dev
            fi
          CIBW_BEFORE_ALL_MACOS: |
            brew install cmake opencv eigen
          CIBW_BEFORE_ALL_WINDOWS: |
            choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
            vcpkg install opencv4 eigen3 --triplet x64-windows
          CIBW_ENVIRONMENT_WINDOWS: >-
            CMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake
            VCPKG_TARGET_TRIPLET=x64-windows
            CMAKE_ARGS=-DBOXMOT_REQUIRE_NATIVE=ON
          CIBW_ENVIRONMENT_LINUX: 'CMAKE_ARGS=-DBOXMOT_REQUIRE_NATIVE=ON'
          CIBW_ENVIRONMENT_MACOS: 'CMAKE_ARGS=-DBOXMOT_REQUIRE_NATIVE=ON'
          CIBW_TEST_COMMAND: 'python -c "import boxmot; print(boxmot.__version__)"'
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
