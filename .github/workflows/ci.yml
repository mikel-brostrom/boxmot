# name of the workflow, what it is doing (optional)
name: BoxMOT CI

# events that trigger the workflow (required)
on:
  push:
    # pushes to the following branches
    branches:
      - master
  pull_request:
    # pull request where master is target
    branches:
      - master

env:
  UV_TORCH_BACKEND: cpu
  UV_INDEX_STRATEGY: unsafe-best-match


jobs:
  trackers:
    runs-on: ${{ matrix.os }}
    outputs:
      status: ${{ job.status }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]   # skip windows-latest for
        python-version: ['3.12']
    env:
      TRACKERS: "ocsort bytetrack botsort deepocsort strongsort boosttrack hybridsort sfsort"
      IMG: ./assets/MOT17-mini/train/MOT17-02-FRCNN/img1/000001.jpg

    # Timeout: https://stackoverflow.com/a/59076067/4521646
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4  # Check out the repository
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # caching pip dependencies
      - name: Install requirements
        shell: bash  # for Windows compatibility
        run: |
          bash .github/scripts/uv_ci_install.sh ".[yolo]"
      - name: Run tracking method
        run: |
          source .venv/bin/activate
          for tracker in $TRACKERS; do
            boxmot track --detector yolov10n.pt --reid osnet_x0_25_msmt17.pt --imgsz 320 --tracker $tracker --source $IMG --verbose
          done

  native_build:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install native build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libopencv-dev libeigen3-dev
      - name: Configure native trackers
        shell: bash
        run: |
          cmake -S native/trackers -B build/native/trackers -DCMAKE_BUILD_TYPE=Release
      - name: Build native trackers
        shell: bash
        run: |
          cmake --build build/native/trackers --config Release --parallel
  tune:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]   # skip windows-latest for
        python-version: ['3.9', '3.12']
    outputs:
      status: ${{ job.status }}

    # Timeout: https://stackoverflow.com/a/59076067/4521646
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4  # Check out the repository
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # caching pip dependencies

      - name: Install requirements
        shell: bash  # for Windows compatibility
        run: |
          bash .github/scripts/uv_ci_install.sh ".[yolo,evolve]"
      - name: Evolve set of parameters for selected tracking method
        run: |
          source .venv/bin/activate
          boxmot tune --detector yolov8n.pt --reid osnet_x0_25_msmt17.pt --n-trials 3 --tracker strongsort --benchmark mot17-mini --ci --classes 0
  metrics:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]   # skip windows-latest for
        python-version: ['3.9', '3.12']
    outputs:
      status: ${{ job.status }}
    env:
      TRACKERS: "ocsort bytetrack botsort deepocsort strongsort boosttrack hybridsort sfsort"

    # Timeout: https://stackoverflow.com/a/59076067/4521646
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4  # Check out the repository
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip' # caching pip dependencies

      - name: Install requirements
        shell: bash  # for Windows compatibility
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          bash .github/scripts/uv_ci_install.sh ".[yolo]"
      - name: Generate detections and embeddings
        run: |
          source .venv/bin/activate
          boxmot generate --benchmark mot17-mini --detector yolov10n.pt --reid osnet_x0_25_msmt17.pt --imgsz 320 --classes 0

      - name: Evaluate MOT17-mini metrics
        shell: bash
        run: |
          source .venv/bin/activate
          echo "Format,Status❔,HOTA,MOTA,IDF1" > metrics.csv
          for tracker in $TRACKERS; do
            if boxmot eval --detector yolov8n.pt --reid osnet_x0_25_msmt17.pt --tracker $tracker --verbose --benchmark mot17-mini --ci --classes 0; then
              STATUS="✅"
            else
              STATUS="❌"
            fi
            if [ -f ${tracker}_output.json ]; then
              cat ${tracker}_output.json
              HOTA=$(jq -r '.HOTA' ${tracker}_output.json)
              MOTA=$(jq -r '.MOTA' ${tracker}_output.json)
              IDF1=$(jq -r '.IDF1' ${tracker}_output.json)
            else
              HOTA=""
              MOTA=""
              IDF1=""
            fi
            TRACKER_NAME=$(echo $tracker | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
            echo "$TRACKER_NAME,$STATUS,$HOTA,$MOTA,$IDF1" >> metrics.csv
          done

      - name: Sort MOT metrics results
        shell: bash
        run: |
          cp metrics.csv results.csv
          (head -n 1 results.csv && tail -n +2 results.csv | sort -t, -k3 -nr) > sorted_results.csv
          column -s, -t sorted_results.csv > pretty_results.txt
      - name: Show Results
        shell: bash
        run: |
          cat pretty_results.txt

  obb:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    env:
      TRACKERS: "ocsort bytetrack botsort deepocsort strongsort boosttrack hybridsort sfsort"
      EXPECTED_OBB_TRACKERS: "ocsort bytetrack botsort sfsort"
      SMOKE_SOURCE: ./assets/DOTA8-MOT/train/P1142__1024__0___824/img1

    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install requirements
        shell: bash
        run: |
          bash .github/scripts/uv_ci_install.sh ".[yolo]"
      - name: Run obb tracking method
        shell: bash
        run: |
          source .venv/bin/activate
          echo "Format,OBB,Reason" > obb.csv
          failed=0
          set +e
          for tracker in $TRACKERS; do
            log_file="${tracker}_obb.log"
            boxmot track --detector yolo11s-obb.pt --reid lmbn_n_duke.pt --tracker "$tracker" --source "$SMOKE_SOURCE" --project runs/ci_smoke --name "$tracker" --exist-ok >"$log_file" 2>&1
            tracker_exit=$?
            if [ "$tracker_exit" -eq 0 ]; then
              OBB_STATUS="✅"
              OBB_REASON="ok"
            else
              OBB_STATUS="❌"
              if grep -q "does not support OBB detections" "$log_file"; then
                if echo " $EXPECTED_OBB_TRACKERS " | grep -q " $tracker "; then
                  OBB_REASON="expected-support-missing"
                  failed=1
                else
                  OBB_REASON="unsupported"
                fi
              else
                OBB_REASON="runtime-error"
                failed=1
              fi
            fi

            TRACKER_NAME=$(echo "$tracker" | awk '{print toupper(substr($0,1,1)) tolower(substr($0,2))}')
            echo "$TRACKER_NAME,$OBB_STATUS,$OBB_REASON" >> obb.csv
            echo "OBB smoke $tracker: $OBB_STATUS ($OBB_REASON)"

            if [ "$tracker_exit" -ne 0 ] && [ "$OBB_REASON" = "runtime-error" ]; then
              cat "$log_file"
            fi
          done
          set -e
          exit "$failed"
      - name: Show OBB Results
        shell: bash
        run: |
          column -s, -t obb.csv
  pose:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          bash .github/scripts/uv_ci_install.sh ".[yolo]"
      - name: Test tracking with pose models
        env:
          IMG: ./assets/MOT17-mini/train/MOT17-02-FRCNN/img1/000001.jpg
        run:  |
          source .venv/bin/activate
          boxmot track --detector yolov8n-pose.pt --imgsz 320 --source $IMG
  yolos:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          bash .github/scripts/uv_ci_install.sh ".[yolo]"
          # Export so that setuptools picks up clang instead of gcc
          echo "CC=clang" >> $GITHUB_ENV
          echo "CXX=clang++" >> $GITHUB_ENV
      - name: Test tracking with pose models
        env:
          IMG: ./assets/MOT17-mini/train/MOT17-02-FRCNN/img1/000001.jpg
        run: |
          source .venv/bin/activate
          uv pip list
          boxmot track --detector yolov10n.pt --imgsz 320 --source $IMG
          boxmot track --detector yolox_n.pt --imgsz 320 --source $IMG
          boxmot track --detector rtdetr_v2_r18vd --imgsz 320 --source $IMG

  seg:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - id: set_result
        run: echo "::set-output name=result::success"
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          bash .github/scripts/uv_ci_install.sh ".[yolo]"
      - name: Test tracking with seg models
        env:
          IMG: ./assets/MOT17-mini/train/MOT17-02-FRCNN/img1/000001.jpg
        run: |
          source .venv/bin/activate
          boxmot track --tracker bytetrack --detector yolov8n-seg.pt --source $IMG
  
  export:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - id: set_result
        run: echo "::set-output name=result::success"
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          sed -i'' -e 's/index = "torch-gpu"/index = "torch-cpu"/g' pyproject.toml
          python -m pip install --upgrade pip setuptools wheel uv
          uv sync --extra yolo --extra onnx --extra openvino --extra tflite

      - name: Test export models
        run: | 
          source .venv/bin/activate
          boxmot export --include torchscript --include onnx --include openvino --include tflite --device cpu --batch-size 3 --dynamic
      - name: Smoke test exported engines
        if: always()
        env:
          IMG: ./assets/MOT17-mini/train/MOT17-02-FRCNN/img1/000001.jpg
        run: |
          source .venv/bin/activate
          TFLITE_MODEL=$(find models -name '*_float32.tflite' | head -n 1)
          engines=(torchscript onnx openvino tflite)
          model_paths=(
            "models/osnet_x0_25_msmt17.torchscript"
            "models/osnet_x0_25_msmt17.onnx"
            "models/osnet_x0_25_msmt17_openvino_model"
            "$TFLITE_MODEL"
          )

          echo "Engine,Export,Inference,Model" > engine_results.csv
          failed=0

          for i in "${!engines[@]}"; do
            engine="${engines[$i]}"
            model_path="${model_paths[$i]}"
            export_status="❌"
            inference_status="❌"

            if [ -n "$model_path" ] && [ -e "$model_path" ]; then
              export_status="✅"
              if boxmot track --reid "$model_path" --imgsz 320 --source "$IMG"; then
                inference_status="✅"
              else
                failed=1
              fi
            else
              failed=1
            fi

            echo "$engine,$export_status,$inference_status,$model_path" >> engine_results.csv
          done

          column -s, -t engine_results.csv
          exit "$failed"
      - name: Summarize exported engines
        if: always()
        run: |
          if [ ! -f engine_results.csv ]; then
            echo "## Export and inference engines" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
            echo "No engine summary was generated." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          successful_engines=$(awk -F, 'NR > 1 && $2 == "✅" && $3 == "✅" {print $1}' engine_results.csv)

          {
            echo "## Export and inference engines"
            echo
            if [ -n "$successful_engines" ]; then
              echo "Successful export and inference engines:"
              echo
              while IFS= read -r engine; do
                [ -n "$engine" ] && echo "- $engine"
              done <<< "$successful_engines"
            else
              echo "No engines completed both export and inference successfully."
            fi
            echo
            echo "| Engine | Export | Inference | Model |"
            echo "| --- | --- | --- | --- |"
            while IFS=, read -r engine export_status inference_status model_path; do
              if [ "$engine" = "Engine" ]; then
                continue
              fi
              echo "| $engine | $export_status | $inference_status | \`$model_path\` |"
            done < engine_results.csv
          } >> "$GITHUB_STEP_SUMMARY"
               
  tests:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ job.status }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: |
          # The dedicated export job installs and smoke-tests export runtimes.
          # The unit suite only needs the runtime/test stacks it imports directly.
          bash .github/scripts/uv_ci_install.sh ".[yolo,evolve]" --group test
      - name: Pytest tests  # after tracking options as this does not download models
        env:
          # directory of PyPi package to be tested
          PACKAGE_DIR: boxmot
          # minimum acceptable test coverage
          COVERAGE_FAIL_UNDER: 25
        run: |
          uv run python -m pytest --cov="$PACKAGE_DIR" --cov-report=html -v -s tests
          uv run python -m coverage report --fail-under="$COVERAGE_FAIL_UNDER"
  # test-gpu:
  #   runs-on: gpu-latest
  #   outputs:
  #     status: ${{ job.status }}
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: Set up Python
  #       uses: actions/setup-python@v5
  #       with:
  #         python-version: '3.12'
  #     - run: |
  #         python -m pip install --upgrade pip setuptools wheel poetry
  #         poetry config virtualenvs.create false
  #         poetry install --with test

  #     - name: Pytest tests  # after tracking options as this does not download models
  #       env:
  #         # directory of PyPi package to be tested
  #         PACKAGE_DIR: boxmot
  #         # minimum acceptable test coverage
  #         COVERAGE_FAIL_UNDER: 25
  #       shell: bash  # for Windows compatibility
  #       run: |
  #         pytest --cov=$PACKAGE_DIR --cov-report=html -v tests/test_cuda.py


  check-failures:
    needs:
      - trackers
      - native_build
      - metrics
      - obb
      - tune
      - export
      - tests
      - pose
      - seg
      - yolos
    if: always()  # This ensures the job runs regardless of previous job failures
    runs-on: ubuntu-latest
    steps:
      - name: Prepare environment variables
        run: |
          echo "trackers_STATUS=${{ needs.trackers.result }}" >> $GITHUB_ENV
          echo "native_build_STATUS=${{ needs.native_build.result }}" >> $GITHUB_ENV
          echo "metrics_STATUS=${{ needs.metrics.result }}" >> $GITHUB_ENV
          echo "obb_STATUS=${{ needs.obb.result }}" >> $GITHUB_ENV
          echo "tune_STATUS=${{ needs.tune.result }}" >> $GITHUB_ENV
          echo "export_STATUS=${{ needs.export.result }}" >> $GITHUB_ENV
          echo "tests_STATUS=${{ needs.tests.result }}" >> $GITHUB_ENV
          echo "pose_STATUS=${{ needs.pose.result }}" >> $GITHUB_ENV
          echo "seg_STATUS=${{ needs.seg.result }}" >> $GITHUB_ENV
          echo "yolos_STATUS=${{ needs.yolos.result }}" >> $GITHUB_ENV
      - name: Check for failures and create summary
        run: |
          summary=""
          failed=false
          # Print all environment variables, grep for those ending with _STATUS, then loop
          for var in $(printenv | grep '_STATUS$'); do
            job_status="${var##*=}"  # Extract the status part
            job_name="${var%%=*}"  # Extract the job name part
            if [[ "$job_status" != "success" ]]; then
              summary+="$job_name failed with status: $job_status\n"
              failed=true
            fi
          done
          if [[ "$failed" = false ]]; then
            summary="All jobs succeeded."
          fi
          echo "Summary: $summary"
