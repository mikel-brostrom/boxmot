
name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  UV_TORCH_BACKEND: cpu
  UV_INDEX_STRATEGY: unsafe-best-match
  HF_TOKEN: ${{ secrets.HF_TOKEN }}

permissions:
  contents: write
  pull-requests: write

jobs:
  mot-metrics-benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tracker: botsort
            backend: py
            sort_key: 10
            fps: "12"
          - tracker: botsort
            backend: cpp
            sort_key: 11
            fps: "-"
          - tracker: boosttrack
            backend: py
            sort_key: 20
            fps: "13"
          - tracker: occluboost
            backend: py
            sort_key: 25
            fps: "13"
          - tracker: strongsort
            backend: py
            sort_key: 30
            fps: "11"
          - tracker: deepocsort
            backend: py
            sort_key: 40
            fps: "12"
          - tracker: bytetrack
            backend: py
            sort_key: 50
            fps: "720"
          - tracker: bytetrack
            backend: cpp
            sort_key: 51
            fps: "-"
          - tracker: hybridsort
            backend: py
            sort_key: 60
            fps: "25"
          - tracker: ocsort
            backend: py
            sort_key: 70
            fps: "890"
          - tracker: ocsort
            backend: cpp
            sort_key: 71
            fps: "-"
          - tracker: sfsort
            backend: py
            sort_key: 80
            fps: "6000"
          - tracker: sfsort
            backend: cpp
            sort_key: 81
            fps: "-"
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl unzip cmake g++ libopencv-dev libeigen3-dev
          bash .github/scripts/uv_ci_install.sh ".[yolo]"

      - name: Restore HF dataset cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface/hub
          key: hf-mot17-parquet-cache-v1

      - name: Evaluate and summarize MOT metrics
        run: |
          source .venv/bin/activate

          TRACKER_BACKEND_ARGS=()
          if [ "${{ matrix.backend }}" = "cpp" ]; then
            TRACKER_BACKEND_ARGS+=(--tracker-backend cpp)
          fi

          if boxmot eval --classes 0 --detector yolox_x_MOT17_ablation.pt --reid lmbn_n_duke.pt --tracker ${{ matrix.tracker }} "${TRACKER_BACKEND_ARGS[@]}" --ci --verbose --benchmark mot17 --split ablation; then
            STATUS="✅"
          else
            STATUS="❌"
          fi

          if [ -f ${{ matrix.tracker }}_output.json ]; then
            HOTA=$(jq -r '.HOTA' ${{ matrix.tracker }}_output.json)
            MOTA=$(jq -r '.MOTA' ${{ matrix.tracker }}_output.json)
            IDF1=$(jq -r '.IDF1' ${{ matrix.tracker }}_output.json)
          else
            HOTA=""
            MOTA=""
            IDF1=""
          fi

          mkdir -p results

          if [ "$STATUS" = "❌" ]; then
            fps=""
          else
            fps="${{ matrix.fps }}"
          fi

          echo "${{ matrix.sort_key }},${{ matrix.tracker }},${{ matrix.backend }},$STATUS,,$HOTA,$MOTA,$IDF1,$fps" > results/${{ matrix.tracker }}_${{ matrix.backend }}.txt

      - name: Show Results
        run: cat results/${{ matrix.tracker }}_${{ matrix.backend }}.txt

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.run_id }}-${{ matrix.tracker }}-${{ matrix.backend }}
          path: results/${{ matrix.tracker }}_${{ matrix.backend }}.txt

  combine-results:
    runs-on: ubuntu-latest
    needs: mot-metrics-benchmark
    steps:
      - uses: actions/checkout@v4

      - name: Download all results artifacts
        uses: actions/download-artifact@v4
        with:
          path: results

      - name: Check downloaded files
        run: |
          echo "Downloaded files in the results directory:"
          ls -la results/*/ || true

      - name: Combine results
        run: |
          : > combined_results.csv
          for file in results/*/*; do
            if [ -f "$file" ]; then
              cat "$file" >> combined_results.csv
            fi
          done

          sort -t, -k1,1n combined_results.csv > sorted_results.csv

      - name: Show Combined Results
        run: cat sorted_results.csv

      - name: Set up Git
        run: |
          git config --local user.email "yolov5.deepsort.pytorch@gmail.com"
          git config --local user.name "mikel-brostrom"

      - name: Update README with tracker results
        run: |
          python3 - sorted_results.csv README.md << 'SCRIPT'
          import csv, re, sys

          results_file, readme_file = sys.argv[1], sys.argv[2]

          # --- Parse CI results ---
          py_data = {}   # tracker -> {hota, mota, idf1}
          cpp_data = {}  # tracker -> {hota, mota, idf1}

          with open(results_file) as f:
              for row in csv.reader(f):
                  if len(row) < 9:
                      continue
                  sort_key, tracker, backend, status, obb, hota, mota, idf1, fps = row[:9]
                  if backend == "py":
                      py_data[tracker] = {"hota": hota, "mota": mota, "idf1": idf1}
                  elif backend == "cpp":
                      cpp_data[tracker] = {"hota": hota, "mota": mota, "idf1": idf1}

          def fmt(val):
              if not val or val in ("-", "—"):
                  return "—"
              try:
                  return f"{float(val):.2f}"
              except ValueError:
                  return val

          def mot17_cell(py_val, cpp_val):
              return f"{fmt(py_val)}<br>({fmt(cpp_val)})"

          # --- Read README and locate table ---
          with open(readme_file) as f:
              readme = f.read()

          start_marker = "<!-- START TRACKER TABLE -->"
          end_marker = "<!-- END TRACKER TABLE -->"
          start_idx = readme.find(start_marker)
          end_idx = readme.find(end_marker)
          if start_idx == -1 or end_idx == -1:
              print("ERROR: table markers not found", file=sys.stderr)
              sys.exit(1)

          table_section = readme[start_idx:end_idx + len(end_marker)]

          # --- Update each tracker row (only MOT17 cells) ---
          # Each row has 11 <td> cells:
          #   0: Tracker name, 1-3: MOT17 (HOTA,MOTA,IDF1),
          #   4-6: SportsMOT, 7-9: MMOT, 10: OBB
          row_pattern = re.compile(r"(<tr>\s*\n(?:\s*<td[^>]*>.*?</td>\s*\n){11}\s*</tr>)", re.DOTALL)
          td_pattern = re.compile(r"(<td[^>]*><sub>)(.*?)(</sub></td>)")

          def update_row(match):
              row_html = match.group(0)
              cells = td_pattern.findall(row_html)
              if len(cells) < 11:
                  return row_html

              # Identify tracker from cell 0 content
              tracker_cell = cells[0][1]
              tracker_name = re.sub(r"<[^>]+>", "", tracker_cell).strip()

              if tracker_name not in py_data:
                  return row_html

              py = py_data[tracker_name]
              cpp = cpp_data.get(tracker_name, {})

              new_hota = mot17_cell(py["hota"], cpp.get("hota", ""))
              new_mota = mot17_cell(py["mota"], cpp.get("mota", ""))
              new_idf1 = mot17_cell(py["idf1"], cpp.get("idf1", ""))

              # Replace cells 1-3 (MOT17 columns) only
              replacements = {1: new_hota, 2: new_mota, 3: new_idf1}
              cell_idx = [0]

              def replace_td(m):
                  idx = cell_idx[0]
                  cell_idx[0] += 1
                  if idx in replacements:
                      return f"{m.group(1)}{replacements[idx]}{m.group(3)}"
                  return m.group(0)

              return td_pattern.sub(replace_td, row_html)

          new_table_section = row_pattern.sub(update_row, table_section)
          new_readme = readme[:start_idx] + new_table_section + readme[end_idx + len(end_marker):]

          with open(readme_file, "w") as f:
              f.write(new_readme)

          print(f"Updated MOT17 results for: {', '.join(py_data.keys())}")
          SCRIPT

      - name: Check for changes in benchmark docs
        id: check_changes
        run: |
          if git diff --quiet README.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            BRANCH_NAME="update-tracker-results-$(date +%Y%m%d%H%M%S)"
            echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            README.md
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.check_changes.outputs.branch_name }}
          commit-message: "docs: update benchmark results"
          title: "docs: update benchmark results"
          body: "This PR updates the benchmark tables in the README."
