site_name: "BoxMOT"
repo_url: https://github.com/mikel-brostrom/boxmot
repo_name: mikel-brostrom/boxmot
theme:
  name: material
  logo: logo/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    # Light mode (default), with a switch to dark.
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode, with a switch back to light.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - mkdocs-click
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            members_order:
              - "__all__"
              - alphabetical
            filters:
              - "!^_[^_]"
              - "!^update$"

watch:
  - README.md
  - boxmot

exclude_docs: |
  AGENTS.md

nav:
  - Quickstart: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
  - Modes:
      - Overview: modes/index.md
      - Track: modes/track.md
      - Generate: modes/generate.md
      - Evaluate: modes/eval.md
      - Tune: modes/tune.md
      - Research: modes/research.md
      - Train ReID: modes/train.md
      - Evaluate ReID: modes/eval-reid.md
      - Export: modes/export.md
  - Configuration:
      - Config System Overview: config/index.md
      - Mode Defaults: config/modes.md
      - Benchmarks: config/benchmarks.md
      - Datasets: config/datasets.md
      - Detectors: config/detectors.md
      - ReID Profiles: config/reid.md
      - Tracker YAMLs: config/trackers.md
  - Trackers:
      - Tracker Overview: trackers/index.md
      - ByteTrack:    trackers/bytetrack.md
      - BotSort:      trackers/botsort.md
      - SFSORT:       trackers/sfsort.md
      - StrongSort:   trackers/strongsort.md
      - OcSort:       trackers/ocsort.md
      - DeepOcSort:   trackers/deepocsort.md
      - HybridSort:   trackers/hybridsort.md
      - BoostTrack:   trackers/boosttrack.md
      - OccluBoost:    trackers/occluboost.md
  - CLI: usage/index.md
  - Concepts:
      - Detection Layouts: concepts/index.md
      - Tracking Pipeline: concepts/tracking-pipeline.md
  - Guides:
      - Benchmark Workflows: guides/benchmarks.md
      - Evaluation and Postprocessing: guides/evaluation.md
      - Troubleshooting and FAQ: guides/troubleshooting.md
  - Native C++: native/index.md
  - Python API:
      - Overview: python/index.md
      - High-level API: python/high-level.md
      - Low-level API: python/low-level.md
  - Contributing:
      - Contributing Guide: contributing/index.md
      - Add a Tracker: contributing/add-tracker.md
      - Add OBB Support: contributing/obb-support.md
      - Add Configs and Benchmarks: contributing/configs.md
      - Testing: contributing/testing.md
      - CI and Benchmarks: contributing/ci.md
