id: sportsmot

dataset:
  id: sportsmot
  root: "data/benchmarks/SportsMOT"
  layout: mot
  box_type: aabb
  splits:
    train: "train"
    val: "val"
    test: "test"
  default_split: val
  no_gt_splits: [test]
  classes:
    1: player

evaluation:
  classes:
    - name: player
      dataset_id: 1
      detector_id: 0
      detector_name: person

download:
  # SportsMOT official split contents:
  #   train: has images + seqinfo.ini + gt/gt.txt
  #          usable for training and local TrackEval evaluation
  #   val:   has images + seqinfo.ini + gt/gt.txt
  #          usable for validation/local TrackEval evaluation
  #   test:  has images + seqinfo.ini only
  #          no public GT; use for inference/submission generation only
  dataset:
    train: "hf://Lekim89/sportsmot/train"
    val: "hf://Lekim89/sportsmot/val"
    test: "hf://Lekim89/sportsmot/test"
  runs:
    val: "hf://Lekim89/runs/runs/dets_n_embs/sportsmot/val"
    test: "hf://Lekim89/runs/runs/dets_n_embs/sportsmot/test"

detector:
  id: yolox_x_sportsmot
  model: "models/yolox_x_sportsmot.pt"
  url: "https://huggingface.co/Lekim89/yolox/resolve/main/yolox_x_sportsmot.pt"
  imgsz: [800, 1440]
  conf: 0.01
  classes:
    0: person

reid:
  id: lmbn_n_duke
  model: "models/lmbn_n_duke.pt"
  url: "https://github.com/mikel-brostrom/yolov8_tracking/releases/download/v9.0/lmbn_n_duke.pth"
  device: ""
  half: true
  preprocess: resize
