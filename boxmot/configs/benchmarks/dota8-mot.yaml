id: dota8-mot

dataset:
  id: dota8-mot
  root: "assets/DOTA8-MOT"
  layout: mot
  box_type: obb
  splits:
    train: "train"
  default_split: train
  classes:
    1: plane
    5: tennis court
    11: small vehicle
    15: swimming pool

download:
  runs: ""

detector:
  id: yolo11s_obb
  model: "models/yolo11s-obb.pt"
  box_type: obb
  imgsz: [1024, 1024]
  conf: 0.2
  classes:
    0: plane
    1: ship
    2: storage tank
    3: baseball diamond
    4: tennis court
    5: basketball court
    6: ground track field
    7: harbor
    8: bridge
    9: large vehicle
    10: small vehicle
    11: helicopter
    12: roundabout
    13: soccer ball field
    14: swimming pool

reid:
  id: lmbn_n_duke
  model: "models/lmbn_n_duke.pt"
  url: "https://github.com/mikel-brostrom/yolov8_tracking/releases/download/v9.0/lmbn_n_duke.pth"
  device: ""
  half: true
  preprocess: resize
