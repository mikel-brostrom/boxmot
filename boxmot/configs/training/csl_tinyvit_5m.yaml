# Training recipe for the optimized CSL-TinyViT ReID backbone
#
# Applies the top three positive changes from the Market-1501 ablation:
#   1. 11M backbone: 86.71% mAP (+3.51 vs 5M baseline)
#   2. weight_decay=0.1: 83.55% mAP (+0.35)
#   3. warmup_epochs=20: 83.50% mAP (+0.30)
#
# Key differences from the generic `vit.yaml` recipe:
#   - lr: 0.0007 (the ViT auto-tuned value, vs 0.0005)
#   - model: csl_tinyvit_11m (loads TinyViT-21M pretrained backbone weights)
#   - weight_decay: 0.1
#   - warmup_epochs: 20
#   - epochs: 250 (ablation winners still peaked near epoch 200/200)
#   - ema_decay: 0 (disabled; multi-branch BN neck causes EMA stat mismatch)
#
# Usage:
#   uv run python -m boxmot.engine.cli train \
#     --recipe csl_tinyvit_5m \
#     --data-dir ./Market-1501-v15.09.15 \
#     --device mps

model: csl_tinyvit_11m
loss: triplet
epochs: 250
lr: 0.0007
weight_decay: 0.1
batch_size: 64
imgsz: [384, 128]
warmup_epochs: 20
margin: 0.3
label_smooth: 0.05
center_loss_weight: 0.005
ema_decay: 0
color_jitter: true
gaussian_blur: true
random_grayscale: 0.1
preprocess: resize
