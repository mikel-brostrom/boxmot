max_age:
  type: randint
  default: 120
  range: [15, 200]

min_hits:
  type: randint
  default: 1
  range: [1, 5]

det_thresh:
  type: uniform
  default: 0.6
  range: [0.1, 0.9]

iou_threshold:
  type: uniform
  default: 0.2
  range: [0.05, 0.9]

use_ecc:
  type: choice
  default: True
  options: [False, True]

min_box_area:
  type: randint
  default: 10
  range: [5, 100]

aspect_ratio_thresh:
  type: uniform
  default: 1.6
  range: [0.1, 2.0]

lambda_iou:
  type: uniform
  default: 0.3
  range: [0.1, 2.0]

lambda_mhd:
  type: uniform
  default: 0.3
  range: [0.1, 2.0]

lambda_shape:
  type: uniform
  default: 0.5
  range: [0.1, 2.0]

use_dlo_boost:
  type: choice
  default: True
  options: [False, True]

use_duo_boost:
  type: choice
  default: False
  options: [False, True]

dlo_boost_coef:
  type: uniform
  default: 0.65
  range: [0.3, 2.0]

s_sim_corr:
  type: choice
  default: False
  options: [False, True]

use_rich_s:
  type: choice
  default: False
  options: [False, True]

use_sb:
  type: choice
  default: True
  options: [False, True]

use_vt:
  type: choice
  default: False
  options: [False, True]

with_reid:
  type: choice
  default: True
  options: [False, True]

cmc_method:
  type: choice
  default: ecc
  options: [sof, ecc]

recovery_appearance_thresh:
  type: uniform
  default: 0.4
  range: [0.2, 0.99]

recovery_iou_thresh:
  type: uniform
  default: 0.2
  range: [0.0, 0.5]

recovery_max_age:
  type: randint
  default: 70
  range: [1, 120]

feat_alpha:
  type: uniform
  default: 0.95
  range: [0.7, 1.0]

track_low_thresh:
  type: uniform
  default: 0.04
  range: [0.05, 0.3]

second_iou_thresh:
  type: uniform
  default: 0.5
  range: [0.3, 0.8]

second_appearance_thresh:
  type: uniform
  default: 0.6
  range: [0.2, 0.9]

second_pass_max_age:
  type: randint
  default: 5
  range: [1, 10]

second_pass_min_hits:
  type: randint
  default: 3
  range: [1, 20]

use_second_pass:
  type: choice
  default: True
  options: [False, True]

new_track_thresh:
  type: uniform
  default: 0.6
  range: [0.3, 0.9]

confirm_hits:
  type: randint
  default: 4
  range: [1, 8]

instant_confirm_thresh:
  type: uniform
  default: 0.77
  range: [0.5, 0.95]

tentative_max_age:
  type: randint
  default: 1
  range: [0, 5]

duplicate_iou_thresh:
  type: uniform
  default: 0.95
  range: [0.5, 1.0]

ams_enabled:
  type: choice
  default: True
  options: [False, True]

ams_alpha0:
  type: uniform
  default: 0.4
  range: [0.0, 1.0]

ams_threshold:
  type: uniform
  default: 0.5
  range: [0.0, 1.0]

ams_buffer_size:
  type: randint
  default: 30
  range: [3, 60]

ams_shrink_ratio:
  type: uniform
  default: 0.75
  range: [0.5, 1.0]

# ---- Online GTA (Global Tracklet Association) ----

gta_enabled:
  type: choice
  default: True
  options: [False, True]

gta_splitter_enabled:
  type: choice
  default: True
  options: [False, True]

gta_splitter_interval:
  type: randint
  default: 5
  range: [3, 20]

gta_splitter_eps:
  type: uniform
  default: 0.4
  range: [0.2, 0.8]

gta_splitter_min_samples:
  type: randint
  default: 3
  range: [2, 8]

gta_splitter_max_clusters:
  type: randint
  default: 2
  range: [2, 4]

gta_splitter_window:
  type: randint
  default: 20
  range: [10, 50]

gta_connector_enabled:
  type: choice
  default: False
  options: [False, True]

gta_connector_gallery_ttl:
  type: randint
  default: 300
  range: [60, 500]

gta_connector_gallery_max:
  type: randint
  default: 200
  range: [50, 500]

gta_connector_match_thresh:
  type: uniform
  default: 0.15
  range: [0.1, 0.5]

gta_connector_spatial_factor:
  type: uniform
  default: 0.5
  range: [0.3, 1.0]

gta_connector_min_tracklet_len:
  type: randint
  default: 3
  range: [1, 10]

gta_connector_max_young_age:
  type: randint
  default: 6
  range: [3, 15]
