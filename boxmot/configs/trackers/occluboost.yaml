# Multiplier for the embedding cost weight in the association cost matrix.
# lambda_emb = (1 + lambda_iou + lambda_shape + lambda_mhd) * lambda_emb_multiplier
# Default 1.5 is tuned for high-dimensional ReID models (e.g. LMBN 3584d).
# For lower-dimensional models (e.g. ViT-Tiny 512d), use ~0.5 to avoid
# over-weighting noisy appearance cues (HOTA 69.50 vs 65.27 at default).
lambda_emb_multiplier:
  type: uniform
  default: 1.5
  range:
  - 0.1
  - 3.0
