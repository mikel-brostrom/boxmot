max_age:
  type: randint
  default: 146
  range: [15, 200]

min_hits:
  type: randint
  default: 1
  range: [1, 5]

det_thresh:
  type: uniform
  default: 0.5678626013369781
  range: [0.1, 0.9]

iou_threshold:
  type: uniform
  default: 0.2957128153631725
  range: [0.05, 0.99]

use_cmc:
  type: choice
  default: True
  options: [False, True]
  activates:
    cmc_method:
      type: choice
      default: sof
      options: [sof, ecc]

min_box_area:
  type: randint
  default: 73
  range: [5, 100]

aspect_ratio_thresh:
  type: uniform
  default: 1.4888137942764672
  range: [0.1, 2.0]

lambda_iou:
  type: uniform
  default: 1.0784558316374715
  range: [0.1, 2.0]

lambda_mhd:
  type: uniform
  default: 0.304435887183232
  range: [0.1, 2.0]

lambda_shape:
  type: uniform
  default: 1.6709449476805447
  range: [0.1, 2.0]

use_dlo_boost:
  type: choice
  default: True
  options: [False, True]
  activates:
    dlo_boost_coef:
      type: uniform
      default: 1.2061962091907352
      range: [0.3, 2.0]

use_duo_boost:
  type: choice
  default: False
  options: [False, True]

s_sim_corr:
  type: choice
  default: False
  options: [False, True]

use_rich_s:
  type: choice
  default: False
  options: [False, True]

use_sb:
  type: choice
  default: True
  options: [False, True]

use_vt:
  type: choice
  default: True
  options: [False, True]

with_reid:
  type: choice
  default: True
  options: [False, True]
  activates:
    recovery_appearance_thresh:
      type: uniform
      default: 0.6732855110134396
      range: [0.2, 0.99]
    recovery_iou_thresh:
      type: uniform
      default: 0.24380051350243462
      range: [0.0, 0.5]
    recovery_max_age:
      type: randint
      default: 113
      range: [1, 120]
    feat_alpha:
      type: uniform
      default: 0.8324072665785186
      range: [0.7, 1.0]

track_low_thresh:
  type: uniform
  default: 0.04473431588067598
  range: [0.01, 0.3]

use_second_pass:
  type: choice
  default: True
  options: [False, True]
  activates:
    second_iou_thresh:
      type: uniform
      default: 0.8131671757478834
      range: [0.3, 0.9]
    second_appearance_thresh:
      type: uniform
      default: 0.364089272226479
      range: [0.2, 0.9]
    second_pass_max_age:
      type: randint
      default: 8
      range: [1, 10]
    second_pass_min_hits:
      type: randint
      default: 7
      range: [1, 20]

new_track_thresh:
  type: uniform
  default: 0.7128242784621849
  range: [0.3, 0.9]

confirm_hits:
  type: randint
  default: 2
  range: [1, 8]

instant_confirm_thresh:
  type: uniform
  default: 0.6783889178413256
  range: [0.5, 0.95]

tentative_max_age:
  type: randint
  default: 3
  range: [0, 5]

duplicate_iou_thresh:
  type: uniform
  default: 0.9571823233925608
  range: [0.5, 1.0]

ams_enabled:
  type: choice
  default: True
  options: [False, True]
  activates:
    ams_alpha0:
      type: uniform
      default: 0.8732388616784778
      range: [0.0, 1.0]
    ams_threshold:
      type: uniform
      default: 0.9206232808452425
      range: [0.0, 1.0]
    ams_buffer_size:
      type: randint
      default: 57
      range: [3, 60]
    ams_shrink_ratio:
      type: uniform
      default: 0.6934881647679682
      range: [0.5, 1.0]

lambda_emb_multiplier:
  type: uniform
  default: 2.9476295884842885
  range: [0.1, 8.0]

gta_enabled:
  type: choice
  default: False
  options: [False, True]
  activates:
    gta_appearance_thresh:
      type: uniform
      default: 0.7125445489563044
      range: [0.3, 0.8]
    gta_min_track_length:
      type: randint
      default: 7
      range: [2, 15]
    gta_smooth_tau:
      type: uniform
      default: 14.757519908748044
      range: [1.0, 20.0]
    gta_interpolate:
      type: choice
      default: False
      options: [False, True]
    gta_max_gap:
      type: randint
      default: 40
      range: [15, 150]

adaptive_kf:
  type: choice
  default: False
  options: [False, True]
