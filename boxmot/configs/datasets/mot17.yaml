id: mot17

path: "boxmot/engine/eval/trackeval/data/MOT17"
dets_n_embs: "runs/dets_n_embs/mot17/test"
split: "test"
train: "train"
val: "val"
test: "test"

splits:
  # Standard MOT17 ablation: FRCNN sequences from the val split (ByteTrack protocol)
  # The download tool provides train and val as separate folders.
  # Use --detection-source public to read det/det.txt instead of running a detector
  ablation:
    path: "val"
    seq_pattern: "*-FRCNN"

layout: mot
box_type: aabb

detector: yolox_x_mot17_ablation
reid: lmbn_n_duke

names:
  1: pedestrian

distractors:
  2: person_on_vehicle
  7: static_person
  8: distractor
  12: reflection

class_map: {}

download:
  dataset: ""
  runs: ""
