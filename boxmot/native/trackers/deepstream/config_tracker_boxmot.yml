#     networkMode: 1
#     workspaceSize: 20
#     inferDims: [256, 128, 3]
#     inputOrder: 1
#     colorFormat: 0
#     netScaleFactor: 1.0
#     offsets: [0.0, 0.0, 0.0]
#     reidFeatureSize: 256
#     addFeatureNormalization: 1
#     keepAspc: 1
#
# --- OSNet (market1501, 128x256) ---
# ReID:
